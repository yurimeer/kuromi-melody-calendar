<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぷっくりデザインプレビュー</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: #f8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
      gap: 40px;
    }
    h2 {
      color: #b06080;
      font-size: 12px;
      letter-spacing: 0.12em;
      margin: 0 0 12px;
      text-align: center;
      text-transform: uppercase;
    }
    .section { display: flex; flex-direction: column; align-items: center; }

    /* ── BG panel ── */
    .bg-panel {
      width: 320px;
      min-height: 200px;
      border-radius: 32px;
      background: #fce8f0;
      box-shadow:
        inset 0 6px 16px rgba(255,255,255,0.7),
        inset 0 -6px 16px rgba(180,100,130,0.2),
        0 12px 40px rgba(180,100,130,0.25);
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Calendar mock ── */
    .cal-mock {
      width: 320px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(160,80,120,0.28);
    }
    .cal-header {
      background: linear-gradient(160deg, #fce8f0 0%, #f0d8ee 100%);
      box-shadow: inset 0 4px 12px rgba(255,255,255,0.8), inset 0 -4px 12px rgba(180,100,130,0.15);
      padding: 18px 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .month-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .month-text {
      font-size: 20px;
      font-weight: 800;
      color: #c06080;
      text-shadow: 0 2px 0 rgba(255,255,255,0.8), 0 4px 8px rgba(180,80,110,0.2);
      letter-spacing: 0.04em;
    }
    .nav-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(160deg, #fff 0%, #fcd0e0 100%);
      box-shadow: 0 4px 10px rgba(200,100,140,0.3), inset 0 1px 3px rgba(255,255,255,0.9);
      color: #c06080;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: linear-gradient(180deg, #fce0ec 0%, #f8d0e4 100%);
    }
    .wd {
      text-align: center;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 800;
      color: #b06880;
    }
    .wd:first-child { color: #e05070; }
    .wd:last-child  { color: #9060c0; }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 6px;
      background: #fff5fa;
    }
    .day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      color: #9a5870;
    }
    .day:nth-child(7n+1) { color: #e05070; }
    .day:nth-child(7n)   { color: #9060c0; }
    .day.today {
      background: radial-gradient(circle at 40% 35%, #ffb8d0, #e06090);
      color: #fff !important;
      box-shadow: 0 4px 12px rgba(220,80,130,0.45), inset 0 1px 4px rgba(255,255,255,0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>

</div>

<script>
  const grid = document.getElementById('mockDays');
  const firstDay = new Date(2026, 3, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day';
    grid.appendChild(el);
  }
  for (let d = 1; d <= 30; d++) {
    const el = document.createElement('div');
    el.className = 'day' + (d === 26 ? ' today' : '');
    el.textContent = d;
    grid.appendChild(el);
  }
</script>
