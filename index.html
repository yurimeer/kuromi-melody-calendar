<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --lavender: #b8aee0;
      --lavender-dark: #8070b8;
      --lavender-deep: #4a3878;
      --glass-bg: rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.45);
      --text: #3a2a5a;
      --text-light: rgba(74,58,106,0.5);
      --sun: #b85878;
      --sat: #6070b8;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Noto Serif JP', serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #ccc4e8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 背景 ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('bg.png') 40% 70% / cover no-repeat;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(200,190,230,0.12);
    }

    /* ── メインコンテナ ── */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      padding: 0 0 calc(24px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── ヘッダー（月ナビ） ── */
    .header {
      padding: max(52px, env(safe-area-inset-top, 52px)) 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

    .month-block {
      text-align: center;
      flex: 1;
    }
    .month-year {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #3a2a58;
    }
    .month-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
    }
    .month-spacer {
      width: 36px;
      visibility: hidden;
    }
    .month-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 600;
      color: #3a2a58;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .weather {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      padding-bottom: 4px;
    }
    .weather-icon { font-size: 22px; line-height: 1; }
    .weather-temp {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      color: #3a2a58;
      letter-spacing: 0.06em;
    }

    /* ── カレンダーカード ── */
    .card {
      margin: 0 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      box-shadow:
        0 4px 24px rgba(100,80,160,0.10),
        inset 0 1px 0 rgba(255,255,255,0.55);
      overflow: hidden;
    }

    /* ── 曜日 ── */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 16px 8px 8px;
    }
    .wd {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: rgba(58,42,90,0.45);
      padding: 4px 0;
    }
    .wd:first-child { color: rgba(180,80,110,0.7); }
    .wd:last-child  { color: rgba(90,100,190,0.7); }

    /* ── 日付グリッド ── */
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 4px 8px 16px;
    }

    .day {
      position: relative;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      user-select: none;
    }
    .day-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 600;
      color: #3a2a58;
      line-height: 1;
    }
    .day:nth-child(7n+1) .day-num { color: #b84068; }
    .day:nth-child(7n)   .day-num { color: #5060b0; }

    .day.empty { pointer-events: none; }
    .day.empty .day-num { color: transparent; }

    .day.today {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .day.today .day-num { color: rgba(58,42,90,0.45) !important; font-weight: 600; }

    .day:not(.empty):not(.today):active {
      background: rgba(255,255,255,0.12);
      transform: scale(0.88);
    }

    /* イベントドット */
    .dot-row {
      display: flex;
      gap: 2px;
      margin-top: 2px;
      height: 4px;
      align-items: center;
      justify-content: center;
    }
    .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
    }
    .day.today .dot { background: rgba(255,255,255,0.9); }

    /* ── イベントリスト ── */
    .events-section {
      margin: 12px 20px 0;
      padding: 18px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      min-height: 72px;
    }
    .events-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.28em;
      color: rgba(58,42,90,0.45);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      gap: 8px;
    }
    .event-item:last-child { border-bottom: none; }
    .event-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: rgba(58,42,90,0.45);
      letter-spacing: 0.06em;
      flex-shrink: 0;
      min-width: 36px;
    }
    .event-text {
      font-size: 13px;
      color: rgba(58,42,90,0.75);
      flex: 1;
      line-height: 1.4;
      font-weight: 400;
    }
    .event-del {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(58,42,90,0.15);
      background: rgba(58,42,90,0.06);
      color: rgba(58,42,90,0.4);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .event-del:active { background: rgba(58,42,90,0.15); }
    .sheet-time {
      width: 100%;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid rgba(180,160,230,0.3);
      background: rgba(255,255,255,0.5);
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .sheet-time:focus {
      border-color: rgba(160,140,220,0.5);
      background: rgba(255,255,255,0.65);
    }
    .no-events {
      font-size: 12px;
      color: rgba(58,42,90,0.45);
      text-align: center;
      padding: 8px 0;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.1em;
    }

    /* ── ボトムシート ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(80,60,120,0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      z-index: 101;
      background: rgba(230,225,248,0.72);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
      border-radius: 32px 32px 0 0;
      border-top: 1px solid rgba(255,255,255,0.6);
      border-left: 1px solid rgba(255,255,255,0.4);
      border-right: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 -4px 32px rgba(100,80,160,0.15);
      padding: 12px 28px calc(28px + var(--safe-bottom));
      transition: transform 0.4s cubic-bezier(0.32,1.2,0.6,1);
    }
    .bottom-sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 36px; height: 3px;
      border-radius: 2px;
      background: rgba(130,110,180,0.25);
      margin: 0 auto 22px;
    }
    .sheet-date-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      color: var(--lavender-deep);
      letter-spacing: 0.03em;
      margin-bottom: 18px;
      text-align: center;
    }
    .sheet-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(180,160,230,0.3);
      background: rgba(255,255,255,0.5);
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    .sheet-input:focus {
      border-color: rgba(160,140,220,0.5);
      background: rgba(255,255,255,0.65);
    }
    .sheet-input::placeholder { color: rgba(130,110,170,0.45); }
    .sheet-add-btn {
      width: 100%;
      padding: 15px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(140,120,200,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.95);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .sheet-add-btn:active {
      transform: scale(0.97);
      background: rgba(140,120,200,0.75);
    }

    /* ── 月リスト (MONTH name) ── */
    .MONTHS { display: none; }
  </style>
</head>
<body>
<div class="bg"></div>

<div class="app">
  <!-- ヘッダー -->
  <div class="header">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <div class="month-block">
      <div class="month-year" id="yearLabel"></div>
      <div class="month-row">
        <div class="month-spacer"></div>
        <div class="month-name" id="monthLabel"></div>
        <div class="weather" id="weatherBlock" style="visibility:hidden">
          <span class="weather-icon" id="weatherIcon"></span>
          <span class="weather-temp" id="weatherTemp"></span>
        </div>
      </div>
    </div>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>

  <!-- カレンダーカード -->
  <div class="card">
    <div class="weekdays">
      <div class="wd">Sun</div><div class="wd">Mon</div><div class="wd">Tue</div>
      <div class="wd">Wed</div><div class="wd">Thu</div><div class="wd">Fri</div><div class="wd">Sat</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <!-- イベントリスト -->
  <div class="events-section" id="eventsSection">
    <div class="events-title" id="eventsTitle">— Events —</div>
    <div id="eventsList"></div>
  </div>
</div>

<!-- ボトムシート -->
<div class="sheet-overlay" id="overlay"></div>
<div class="bottom-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-date-label" id="sheetDateLabel"></div>
  <input class="sheet-time" id="sheetTime" type="time">
  <input class="sheet-input" id="sheetInput" type="text" placeholder="予定を入力..." maxlength="50">
  <button class="sheet-add-btn" id="sheetAddBtn">Add</button>
</div>

<script>
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  const today   = new Date();
  let   current = new Date(today.getFullYear(), today.getMonth(), 1);
  let   selectedDate = null;

  // ── storage ──
  function storageKey(y, m, d) { return `cal_${y}_${m+1}_${d}`; }
  function getEvents(y, m, d) {
    try { return JSON.parse(localStorage.getItem(storageKey(y,m,d)) || '[]'); }
    catch(e) { return []; }
  }
  function saveEvents(y, m, d, arr) {
    localStorage.setItem(storageKey(y,m,d), JSON.stringify(arr));
  }
  // 旧データ（文字列）を新形式に変換
  function normalizeEvent(ev) {
    return typeof ev === 'string' ? { time: '', text: ev } : ev;
  }

  // ── render calendar ──
  function render() {
    const y = current.getFullYear();
    const m = current.getMonth();
    document.getElementById('yearLabel').textContent = y;
    document.getElementById('monthLabel').textContent = m + 1;

    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m+1, 0).getDate();
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day empty';
      el.innerHTML = '<span class="day-num"></span><div class="dot-row"></div>';
      grid.appendChild(el);
    }
    for (let d = 1; d <= lastDate; d++) {
      const el = document.createElement('div');
      const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
      const isSelected = selectedDate && selectedDate.y === y && selectedDate.m === m && selectedDate.d === d;
      el.className = 'day' + (isToday ? ' today' : '') + (isSelected && !isToday ? ' selected' : '');
      const events = getEvents(y, m, d);
      const dots = events.slice(0,3).map(() => `<div class="dot"></div>`).join('');
      el.innerHTML = `<span class="day-num">${d}</span><div class="dot-row">${dots}</div>`;
      el.addEventListener('click', () => openSheet(y, m, d));
      grid.appendChild(el);
    }
    renderEventList();
  }

  // ── event list ──
  function renderEventList() {
    const y = current.getFullYear();
    const m = current.getMonth();

    if (!selectedDate || selectedDate.y !== y || selectedDate.m !== m) {
      document.getElementById('eventsTitle').textContent = '— Events —';
      document.getElementById('eventsList').innerHTML =
        '<div class="no-events">日付をタップして予定を追加</div>';
      return;
    }

    const { d } = selectedDate;
    const raw = getEvents(y, m, d);
    const events = raw.map(normalizeEvent);
    // 時刻順にソート
    events.sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
    document.getElementById('eventsTitle').textContent = `${y}年 ${m+1}月 ${d}日`;

    const list = document.getElementById('eventsList');
    if (events.length === 0) {
      list.innerHTML = '<div class="no-events">予定なし</div>';
    } else {
      list.innerHTML = events.map((ev, i) => `
        <div class="event-item">
          ${ev.time ? `<span class="event-time">${ev.time}</span>` : ''}
          <span class="event-text">${escHtml(ev.text)}</span>
          <button class="event-del" data-idx="${i}">×</button>
        </div>`).join('');
      list.querySelectorAll('.event-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const arr = getEvents(y, m, d).map(normalizeEvent);
          arr.sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
          arr.splice(+btn.dataset.idx, 1);
          saveEvents(y, m, d, arr);
          render();
        });
      });
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── bottom sheet ──
  function openSheet(y, m, d) {
    selectedDate = { y, m, d };
    document.getElementById('sheetDateLabel').textContent =
      `${MONTH_NAMES[m]} ${d}, ${y}`;
    document.getElementById('sheetInput').value = '';
    document.getElementById('sheetTime').value = '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
    setTimeout(() => document.getElementById('sheetTime').focus(), 400);
    render();
  }

  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('sheetInput').blur();
  }

  document.getElementById('overlay').addEventListener('click', closeSheet);

  document.getElementById('sheetAddBtn').addEventListener('click', () => {
    const text = document.getElementById('sheetInput').value.trim();
    const time = document.getElementById('sheetTime').value;
    if (!text || !selectedDate) return;
    const { y, m, d } = selectedDate;
    const arr = getEvents(y, m, d);
    arr.push({ time, text });
    saveEvents(y, m, d, arr);
    document.getElementById('sheetInput').value = '';
    document.getElementById('sheetTime').value = '';
    closeSheet();
    render();
  });

  document.getElementById('sheetInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('sheetAddBtn').click();
  });

  // ── nav ──
  document.getElementById('prevBtn').addEventListener('click', () => {
    current.setMonth(current.getMonth() - 1);
    selectedDate = null;
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    current.setMonth(current.getMonth() + 1);
    selectedDate = null;
    render();
  });

  render();

  // ── 天気取得（GPS → IP fallback）──
  const WMO = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌦️', 55:'🌧️',
    61:'🌧️', 63:'🌧️', 65:'🌧️',
    71:'🌨️', 73:'🌨️', 75:'❄️',
    80:'🌦️', 81:'🌧️', 82:'⛈️',
    95:'⛈️', 96:'⛈️', 99:'⛈️'
  };

  function showWeather(icon, temp) {
    document.getElementById('weatherIcon').textContent = icon;
    document.getElementById('weatherTemp').textContent = Math.round(temp) + '°';
    document.getElementById('weatherBlock').style.visibility = 'visible';
  }

  function fetchWeather(lat, lon) {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`)
      .then(r => r.json())
      .then(data => {
        const icon = WMO[data.current.weather_code] ?? '🌡️';
        showWeather(icon, data.current.temperature_2m);
      })
      .catch(() => {});
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      () => {
        // GPS拒否 → IPで位置取得
        fetch('https://ipapi.co/json/')
          .then(r => r.json())
          .then(d => fetchWeather(d.latitude, d.longitude))
          .catch(() => {});
      },
      { timeout: 8000 }
    );
  } else {
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => fetchWeather(d.latitude, d.longitude))
      .catch(() => {});
  }
</script>
</body>
</html>
